server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Хешированные ассеты Vite (index-XXXX.js/css): при каждой сборке имя файла
  # меняется, поэтому старые версии никогда не конфликтуют — кешируем надолго.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # index.html и SPA-маршруты — ВСЕГДА свежие. Иначе встроенный браузер Telegram
  # держит старый index.html (со ссылками на старые ассеты) и показывает прошлую
  # версию до ручного «Обновить страницу». no-store заставляет каждый раз брать
  # актуальный index.html, и после деплоя новая версия видна сразу при входе.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
