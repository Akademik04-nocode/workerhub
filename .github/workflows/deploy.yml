name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # npm ci: воспроизводимая установка строго по lock-файлу
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  deploy:
    needs: [backend, frontend, bot]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          # Образы собираются локально на сервере — `docker compose pull` не нужен
          # (для build-сервисов без registry он завершается ошибкой).
          # Миграции применяются автоматически при старте backend.
          script: |
            set -e
            cd /opt/worker-hub
            git pull --ff-only
            docker compose up -d --build
            # Автоочистка: удаляем старые версии образов, чтобы не забивать диск
            # (важно для серверов с маленьким диском, например 10 ГБ).
            docker image prune -f
            docker builder prune -f --keep-storage 1GB
